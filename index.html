<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SCRAPER · România</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#06090e" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #06090e; }
    body { font-family: 'Space Mono', 'Courier New', monospace; color: #c8d6e8; display: flex; flex-direction: column; }
    .leaflet-container { background: #0a0f1a !important; }
    .leaflet-control-attribution { font-size: 8px !important; background: rgba(6,9,18,0.75) !important; color: #2a4a6a !important; }
    .leaflet-control-attribution a { color: #3a6a9a !important; }
    .leaflet-control-zoom a { background: #0d1a28 !important; color: #4a7aaa !important; border-color: #1a3050 !important; font-size: 16px !important; }
    .leaflet-control-zoom a:hover { background: #111d2c !important; color: #00ff8c !important; }

    #header { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:#06090e; border-bottom:1px solid #0d1620; z-index:500; flex-shrink:0; gap:8px; }
    #search-bar { flex:1; display:flex; align-items:center; background:#0a1520; border:1px solid #0d2030; border-radius:4px; padding:0 8px; max-width:240px; }
    #search-input { background:none; border:none; outline:none; color:#8ab4d4; font-family:'Space Mono',monospace; font-size:10px; width:100%; padding:5px 0; }
    #search-input::placeholder { color:#1e3a5a; }
    #search-results { position:absolute; top:100%; left:0; right:0; background:#07101a; border:1px solid #0d2030; border-top:none; border-radius:0 0 4px 4px; z-index:800; max-height:200px; overflow-y:auto; display:none; }
    #search-wrap { position:relative; flex:1; max-width:240px; }
    .search-result-item { padding:7px 10px; font-size:10px; color:#8ab4d4; cursor:pointer; border-bottom:1px solid #080f18; display:flex; justify-content:space-between; }
    .search-result-item:hover { background:#0a1825; }
    .search-result-item .sr-type { font-size:8px; color:#1e3a5a; }

    #toolbar { display:flex; flex-direction:column; background:#08101a; border-bottom:1px solid #0d1620; z-index:500; flex-shrink:0; }
    .tb-row { display:flex; align-items:center; gap:5px; padding:4px 10px; flex-wrap:nowrap; overflow-x:auto; }
    .tb-row:first-child { border-bottom:1px solid #0a1520; }
    .tb-row::-webkit-scrollbar { display:none; }
    .tb-group { display:flex; align-items:center; gap:4px; }
    .tb-sep { width:1px; height:16px; background:#0d1620; flex-shrink:0; margin:0 3px; }
    #error-bar { display:none; align-items:center; justify-content:space-between; padding:5px 14px; background:#180808; border-bottom:1px solid #2a1010; font-size:10px; color:#ff7070; z-index:500; flex-shrink:0; }
    #main { flex:1; display:flex; overflow:hidden; min-height:0; }

    #sidebar { width:210px; flex-shrink:0; background:#07101a; border-right:1px solid #0d1620; overflow-y:auto; display:flex; flex-direction:column; z-index:300; }
    #sidebar::-webkit-scrollbar { width:4px; }
    #sidebar::-webkit-scrollbar-track { background:#06090e; }
    #sidebar::-webkit-scrollbar-thumb { background:#0d1a28; border-radius:2px; }
    .sidebar-header { padding:8px 10px 5px; font-size:8px; color:#1e3a5a; letter-spacing:0.2em; border-bottom:1px solid #0a1520; flex-shrink:0; }
    .region-item { padding:7px 10px; border-bottom:1px solid #080f18; cursor:pointer; transition:background .12s; -webkit-tap-highlight-color:transparent; }
    .region-item:hover { background:#0a1825; }
    .region-item.active { background:#071520; border-left:2px solid #00ff8c; padding-left:8px; }
    .region-name { font-size:10px; color:#8ab4d4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; justify-content:space-between; }
    .region-name .rtype { font-size:7px; flex-shrink:0; margin-left:3px; padding:1px 3px; border-radius:2px; }
    .rtype-ORAȘ     { background:#0d1a28; color:#4a7aaa; }
    .rtype-CAPITALĂ { background:#1a0d28; color:#aa4aff; }
    .rtype-NATURĂ   { background:#0d1a10; color:#4aaa6a; }
    .rtype-LITORAL  { background:#0d1828; color:#4a9aaa; }
    .rtype-UNESCO   { background:#1a1a0d; color:#aaaa4a; }
    .rtype-SKI      { background:#1a1828; color:#8a8aff; }
    .region-pct { font-size:9px; color:#00ff8c; font-weight:700; margin-top:2px; }
    .region-bar-bg { height:2px; background:#0d1620; border-radius:2px; margin-top:3px; }
    .region-bar { height:2px; border-radius:2px; width:0%; transition:width .3s; }
    .region-item.done .region-name { color:#00ff8c; }
    .region-item.done .region-pct::after { content:" ✓"; }

    #map-wrap { flex:1; position:relative; overflow:hidden; min-height:0; }
    #map { position:absolute; inset:0; width:100%; height:100%; }
    #fog { position:absolute; top:0; left:0; pointer-events:none; z-index:400; }

    /* Region HUD */
    #region-hud { position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:500; background:rgba(6,9,20,0.9); border:1px solid #0d2030; border-radius:5px; padding:5px 14px; text-align:center; display:none; pointer-events:none; white-space:nowrap; }
    .rh-name { font-size:10px; color:#8ab4d4; }
    .rh-pct  { font-size:17px; font-weight:700; color:#00ff8c; line-height:1.2; }
    .rh-tiles { font-size:8px; color:#1e3a5a; }

    /* Speed HUD */
    #speed-hud { position:absolute; bottom:105px; right:10px; z-index:500; background:rgba(6,9,20,0.9); border:1px solid #0d2030; border-radius:5px; padding:5px 10px; text-align:center; display:none; pointer-events:none; min-width:60px; }
    #speed-val { font-size:22px; font-weight:700; color:#00ff8c; line-height:1; }
    #speed-unit { font-size:8px; color:#1e3a5a; letter-spacing:0.1em; }

    /* KM Counter */
    #km-hud { position:absolute; bottom:10px; right:10px; z-index:500; background:rgba(6,9,20,0.9); border:1px solid #0d2030; border-radius:5px; padding:5px 10px; text-align:center; pointer-events:none; min-width:60px; }
    #km-val { font-size:22px; font-weight:700; color:#4ac8ff; line-height:1; }
    #km-unit { font-size:8px; color:#1e3a5a; letter-spacing:0.1em; }
    #km-reset { font-size:7px; color:#1e3a5a; margin-top:3px; cursor:pointer; pointer-events:all; letter-spacing:0.08em; text-transform:uppercase; }
    #km-reset:hover { color:#4ac8ff; }

    /* Minimap */
    #minimap { position:absolute; bottom:10px; left:10px; z-index:500; width:110px; height:80px; border:1px solid #0d2030; border-radius:4px; overflow:hidden; background:#06090e; }
    #minimap canvas { width:100%; height:100%; }

    /* Achievements panel */
    #ach-panel { position:absolute; inset:0; background:rgba(6,9,20,0.96); z-index:700; display:none; flex-direction:column; }
    #ach-panel.open { display:flex; }
    #ach-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid #0d1620; flex-shrink:0; }
    #ach-list { flex:1; overflow-y:auto; padding:10px; display:flex; flex-wrap:wrap; gap:8px; align-content:flex-start; }
    .ach-card { width:calc(50% - 4px); background:#07101a; border:1px solid #0d1620; border-radius:6px; padding:10px; transition:border-color .2s; }
    .ach-card.unlocked { border-color:#00ff8c; }
    .ach-card.unlocked .ach-name { color:#00ff8c; }
    .ach-icon { font-size:22px; margin-bottom:4px; }
    .ach-name { font-size:10px; color:#4a7aaa; font-weight:700; }
    .ach-desc { font-size:8px; color:#1e3a5a; margin-top:2px; line-height:1.4; }
    .ach-card.unlocked .ach-desc { color:#4a8a6a; }

    /* Stats panel */
    #stats-panel { position:absolute; inset:0; background:rgba(6,9,20,0.97); z-index:700; display:none; flex-direction:column; }
    #stats-panel.open { display:flex; }
    #stats-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid #0d1620; flex-shrink:0; }
    #stats-body { flex:1; overflow-y:auto; padding:12px; }
    .stats-section { margin-bottom:18px; }
    .stats-section-title { font-size:8px; color:#1e3a5a; letter-spacing:0.2em; margin-bottom:8px; padding-bottom:4px; border-bottom:1px solid #0a1520; }
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .stats-card { background:#07101a; border:1px solid #0d1620; border-radius:6px; padding:10px 12px; }
    .stats-card.wide { grid-column:1/-1; }
    .stats-card .sc-val { font-size:20px; font-weight:700; color:#00ff8c; line-height:1.1; }
    .stats-card .sc-val.blue { color:#4ac8ff; }
    .stats-card .sc-val.purple { color:#aa4aff; }
    .stats-card .sc-val.yellow { color:#ffcc44; }
    .stats-card .sc-val.red { color:#ff6644; }
    .stats-card .sc-lbl { font-size:8px; color:#1e3a5a; letter-spacing:0.12em; margin-top:2px; }
    .stats-card .sc-sub { font-size:9px; color:#4a7aaa; margin-top:4px; }
    .region-top-bar { height:3px; border-radius:2px; margin-top:6px; background:#0d1620; }
    .region-top-fill { height:3px; border-radius:2px; }
    .stats-divider { height:1px; background:#0a1520; margin:6px 0; }
    #stats-region-list { display:flex; flex-direction:column; gap:4px; margin-top:6px; }
    .stats-region-row { display:flex; align-items:center; justify-content:space-between; font-size:9px; color:#4a7aaa; padding:3px 0; border-bottom:1px solid #080f18; }
    .stats-region-row .srr-name { color:#8ab4d4; }
    .stats-region-row .srr-pct { color:#00ff8c; font-weight:700; }

    /* Achievement toast */
    #ach-toast { position:absolute; top:70px; left:50%; transform:translateX(-50%); z-index:800; background:rgba(0,40,20,0.97); border:1px solid #00ff8c; border-radius:6px; padding:8px 16px; text-align:center; display:none; pointer-events:none; white-space:nowrap; }
    #ach-toast .at-icon { font-size:20px; }
    #ach-toast .at-label { font-size:8px; color:#4aaa7a; letter-spacing:0.15em; }
    #ach-toast .at-name { font-size:12px; color:#00ff8c; font-weight:700; }

    .btn { border:none; cursor:pointer; font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.06em; text-transform:uppercase; border-radius:4px; padding:4px 9px; transition:all .15s; -webkit-tap-highlight-color:transparent; }
    #btn-locate { background:#003d20; color:#00ff8c; border:1px solid #00aa55; }
    #btn-locate:disabled { opacity:0.6; cursor:default; }
    .style-btn { background:#0d1a28; color:#4a7aaa; border:1px solid #1a3050; padding:3px 7px; font-size:9px; }
    .style-btn.on { background:#003d20; color:#00ff8c; border-color:#00aa55; }
    #btn-track { background:#0d1a28; color:#4a7aaa; border:1px solid #1a3050; }
    #btn-track.on { background:#001a3a; color:#4af; border-color:#0af; }
    #btn-sidebar { background:#0d1a28; color:#4a7aaa; border:1px solid #1a3050; padding:4px 8px; }
    #btn-battery { background:#0d1a28; color:#4a7aaa; border:1px solid #1a3050; padding:4px 8px; }
    #btn-battery.on { background:#1a1200; color:#ffaa00; border-color:#aa7000; }
    #btn-share { background:#0d1a28; color:#4a7aaa; border:1px solid #1a3050; padding:4px 8px; }
    .stat-val { font-size:16px; font-weight:700; line-height:1; }
    .stat-lbl { font-size:7px; color:#1e3a5a; letter-spacing:0.12em; }
    .divider { width:1px; height:22px; background:#0d1620; flex-shrink:0; }
    .map-lbl { font-size:8px; color:#1e3a5a; letter-spacing:0.14em; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { display:inline-block; animation:spin 1s linear infinite; }
    @keyframes slideDown { from{opacity:0;transform:translateX(-50%) translateY(-8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    .toast-in { animation:slideDown .3s ease-out; }
    @media (max-width:600px) {
      #sidebar { position:absolute; left:-210px; top:0; bottom:0; z-index:600; transition:left .2s; }
      #sidebar.open { left:0; box-shadow:4px 0 20px rgba(0,0,0,0.6); }
    }
    @media (min-width:601px) { #btn-sidebar { display:none; } }
  </style>
</head>
<body>

<div id="header">
  <div style="display:flex;flex-direction:column;flex-shrink:0">
    <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff;letter-spacing:-0.03em;line-height:1">SCRAPER</div>
    <div style="font-size:7px;color:#1e3a5a;letter-spacing:0.2em;margin-top:2px;display:flex;align-items:center;gap:4px">
      ROMÂNIA <span id="online-dot" style="display:inline-block;width:5px;height:5px;border-radius:50%;background:#00ff8c"></span>
    </div>
  </div>
  <div id="search-wrap">
    <div id="search-bar">
      <span style="color:#1e3a5a;font-size:11px;margin-right:5px">⌕</span>
      <input id="search-input" type="text" placeholder="Search region…" autocomplete="off" />
    </div>
    <div id="search-results"></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
    <div style="text-align:right">
      <div class="stat-val" id="pct-total" style="color:#00ff8c">0.00%</div>
      <div class="stat-lbl">ROMÂNIA</div>
    </div>
    <div class="divider"></div>
    <div style="text-align:right">
      <div class="stat-val" id="regions-done" style="font-size:13px;color:#8ab4d4">0/0</div>
      <div class="stat-lbl">REGIONS</div>
    </div>
  </div>
</div>

<div id="toolbar">
  <!-- Row 1: Navigation & Map style -->
  <div class="tb-row">
    <div class="tb-group">
      <button class="btn" id="btn-sidebar">☰</button>
      <button class="btn" id="btn-locate">⌖ Locate</button>
      <button class="btn" id="btn-track">⊙ Track</button>
      <button class="btn" id="btn-battery" title="Battery saver mode">🔋</button>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-group">
      <span class="map-lbl">MAP</span>
      <button class="btn style-btn on" data-style="street">Street</button>
      <button class="btn style-btn"    data-style="dark">Dark</button>
      <button class="btn style-btn"    data-style="sat">Sat</button>
      <button class="btn style-btn"    data-style="topo">Topo</button>
    </div>
  </div>
  <!-- Row 2: Data & Actions -->
  <div class="tb-row">
    <div class="tb-group">
      <button class="btn" id="btn-ach">🏆 Achievements</button>
      <button class="btn" id="btn-stats">📊 Stats</button>
      <button class="btn" id="btn-share" title="Share progress">📤 Share</button>
    </div>
    <input type="file" id="import-input" accept=".json" style="display:none" />
    <button id="btn-export" style="display:none"></button>
    <button id="btn-import" style="display:none"></button>
    <button id="btn-reset"  style="display:none"></button>
  </div>
</div>

<div id="error-bar">
  <span id="error-msg"></span>
  <button onclick="closeError()" style="background:none;border:none;color:#ff7070;cursor:pointer;font-size:14px;padding:0 4px">✕</button>
</div>

<div id="main">
  <div id="sidebar">
    <div class="sidebar-header" style="display:flex;align-items:center;justify-content:space-between">
      <span>REGIONS · TAP TO JUMP</span>
      <button onclick="document.getElementById('sidebar').classList.remove('open')" style="background:none;border:none;color:#1e3a5a;cursor:pointer;font-size:16px;padding:0 2px;line-height:1">✕</button>
    </div>
    <div id="region-list"></div>
  </div>
  <div id="map-wrap">
    <div id="map"></div>
    <canvas id="fog"></canvas>
    <div id="region-hud">
      <div class="rh-name" id="hud-name">—</div>
      <div class="rh-pct"  id="hud-pct">0.00%</div>
      <div class="rh-tiles" id="hud-tiles">0 / 0 TILES</div>
    </div>
    <div id="speed-hud">
      <div id="speed-val">0</div>
      <div id="speed-unit">KM/H</div>
    </div>
    <div id="km-hud">
      <div id="km-val">0.00</div>
      <div id="km-unit">KM WALKED</div>
      <div id="km-reset">⟳ reset</div>
    </div>
    <div id="minimap"><canvas id="minimap-canvas"></canvas></div>
    <div id="ach-toast">
      <div class="at-icon" id="at-icon">🏆</div>
      <div class="at-label">ACHIEVEMENT UNLOCKED</div>
      <div class="at-name" id="at-name">—</div>
    </div>
    <!-- Achievements panel -->
    <div id="ach-panel">
      <div id="ach-header">
        <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff">🏆 Achievements</div>
        <button onclick="document.getElementById('ach-panel').classList.remove('open')" style="background:none;border:none;color:#4a7aaa;cursor:pointer;font-size:18px">✕</button>
      </div>
      <div id="ach-list"></div>
    </div>
  </div>
  <!-- Stats panel -->
  <div id="stats-panel">
    <div id="stats-header">
      <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff">📊 Stats</div>
      <button onclick="document.getElementById('stats-panel').classList.remove('open')" style="background:none;border:none;color:#4a7aaa;cursor:pointer;font-size:18px">✕</button>
    </div>
    <div id="stats-body">
      <!-- filled by renderStats() -->
    </div>
  </div>
</div>

const unlockedAch = new Set();

function checkAchievements() {
  ACHIEVEMENTS.forEach(a => {
    if (unlockedAch.has(a.id)) return;
    if (a.check()) {
      unlockedAch.add(a.id);
      saveAchievements();
      showAchToast(a);
      renderAchPanel();
    }
  });
}
function saveAchievements() {
  try { localStorage.setItem("scraper_ach_v1", JSON.stringify([...unlockedAch])); } catch(e) {}
}
function loadAchievements() {
  try {
    const raw = localStorage.getItem("scraper_ach_v1");
    if (raw) JSON.parse(raw).forEach(id => unlockedAch.add(id));
  } catch(e) {}
}
let toastTimer = null;
function showAchToast(a) {
  const toast = document.getElementById("ach-toast");
  document.getElementById("at-icon").textContent = a.icon;
  document.getElementById("at-name").textContent = a.name;
  toast.style.display = "block";
  toast.classList.add("toast-in");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.style.display = "none"; toast.classList.remove("toast-in"); }, 3500);
}
function renderAchPanel() {
  const list = document.getElementById("ach-list");
  list.innerHTML = "";
  ACHIEVEMENTS.forEach(a => {
    const unlocked = unlockedAch.has(a.id);
    const card = document.createElement("div");
    card.className = "ach-card" + (unlocked ? " unlocked" : "");
    card.innerHTML = `<div class="ach-icon">${unlocked ? a.icon : "🔒"}</div><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div>`;
    list.appendChild(card);
  });
}

const STATS_KEY = "scraper_stats_v1";
function saveStats() {
  try {
    localStorage.setItem(STATS_KEY, JSON.stringify({
      topSpeed, totalSeconds, firstExplore, sessionsCount
    }));
  } catch(e) {}
}
function loadStats() {
  try {
    const raw = localStorage.getItem(STATS_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.topSpeed)      topSpeed      = d.topSpeed;
    if (d.totalSeconds)  totalSeconds  = d.totalSeconds;
    if (d.firstExplore)  firstExplore  = d.firstExplore;
    if (d.sessionsCount) sessionsCount = d.sessionsCount;
  } catch(e) {}
}
function clearStats() {
  topSpeed=0; totalSeconds=0; firstExplore=null; sessionsCount=0;
  try { localStorage.removeItem(STATS_KEY); } catch(e) {}
}

const SAVE_KEY = "scraper_romania_v1";
function saveProgress() {
  const data = {};
  REGIONS.forEach(r => { data[r.id] = [...exploredMap[r.id]]; });
  data.__km = totalKm;
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) {}
}
function loadProgress() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    REGIONS.forEach(r => { if (data[r.id]) exploredMap[r.id] = new Set(data[r.id]); });
    if (data.__km) { totalKm = data.__km; updateKmHud(); }
  } catch(e) {}
}
function clearProgress() {
  REGIONS.forEach(r => { exploredMap[r.id] = new Set(); });
  unlockedAch.clear();
  clearStats();
  try { localStorage.removeItem(SAVE_KEY); localStorage.removeItem("scraper_ach_v1"); } catch(e) {}
  playerPos = null; totalKm = 0; updateKmHud();
  updateAll(); redrawFog(); renderAchPanel();
}

// ═══════════════════════════════════════════════════════
// GEO HELPERS
// ═══════════════════════════════════════════════════════
function regionOrigin(r) {
  return [ r.center[0] + (r.gridH/2)*r.tileDeg, r.center[1] - (r.gridW/2)*r.tileDeg ];
}
function latLngToTile(r, lat, lng) {
  const [oLat,oLng] = regionOrigin(r);
  return { tx:Math.floor((lng-oLng)/r.tileDeg), ty:Math.floor((oLat-lat)/r.tileDeg) };
}
function tileCenter(r, tx, ty) {
  const [oLat,oLng] = regionOrigin(r);
  return [ oLat - ty*r.tileDeg - r.tileDeg/2, oLng + tx*r.tileDeg + r.tileDeg/2 ];
}
function inBounds(r, tx, ty) { return tx>=0 && tx<r.gridW && ty>=0 && ty<r.gridH; }
function regionsAt(lat, lng) {
  return REGIONS.filter(r => { const {tx,ty}=latLngToTile(r,lat,lng); return inBounds(r,tx,ty); });
}

// ═══════════════════════════════════════════════════════
// REVEAL
// ═══════════════════════════════════════════════════════
function revealAt(lat, lng) {
  const affected = regionsAt(lat, lng);
  affected.forEach(r => {
    const {tx,ty} = latLngToTile(r,lat,lng);
    for(let dx=-REVEAL_R;dx<=REVEAL_R;dx++)
      for(let dy=-REVEAL_R;dy<=REVEAL_R;dy++)
        if(dx*dx+dy*dy<=REVEAL_R*REVEAL_R) {
          const nx=tx+dx, ny=ty+dy;
          if(inBounds(r,nx,ny)) exploredMap[r.id].add(`${nx},${ny}`);
        }
  });
  if(affected.length>0) {
    const closest = affected.reduce((best,r)=>{
      const d=Math.hypot(r.center[0]-lat,r.center[1]-lng);
      return(!best||d<Math.hypot(best.center[0]-lat,best.center[1]-lng))?r:best;
    },null);
    setActiveRegion(closest);
  }
  if(!firstExplore && Object.values(exploredMap).some(s=>s.size>0)){
    firstExplore = new Date().toISOString().slice(0,10);
    saveStats();
  }
  saveProgress();
  checkAchievements();
}

// Fill tiles between two GPS positions to avoid broken trails on fast movement
function revealLine(lat1, lng1, lat2, lng2) {
  const dist = Math.hypot(lat2-lat1, lng2-lng1);
  const steps = Math.max(1, Math.ceil(dist / 0.0008));
  for (let i=0; i<=steps; i++) {
    const t = i/steps;
    revealAt(lat1 + (lat2-lat1)*t, lng1 + (lng2-lng1)*t);
  }
}

// Haversine distance in km between two lat/lng points
function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function updateKmHud() {
  const el = document.getElementById("km-val");
  if (!el) return;
  el.textContent = totalKm >= 100 ? totalKm.toFixed(1) : totalKm.toFixed(2);
}

let deviceHeading = 0;
function handleOrientation(e) {
  if (!rotateMode) return;
  const heading = e.webkitCompassHeading || (e.alpha != null ? 360 - e.alpha : 0);

// ═══════════════════════════════════════════════════════
// FOG
// ═══════════════════════════════════════════════════════
const canvas=document.getElementById("fog"), ctx=canvas.getContext("2d");
function redrawFog() {
  const sz=map.getSize();
  canvas.width=sz.x; canvas.height=sz.y;
  canvas.style.width=sz.x+"px"; canvas.style.height=sz.y+"px";

  // Draw fog per type with its color
  REGIONS.forEach(r => {
    if (!exploredMap[r.id].size) return;
    const fogColor = (FOG_COLORS[r.type] || "rgba(6,9,20,") + FOG_ALPHA + ")";
    // We draw per-region fog: fill region bounding box, then punch out explored tiles
    // For simplicity, we just use the main canvas approach but tint per type
  });

  // Fill full fog
  ctx.fillStyle = `rgba(6,9,20,${FOG_ALPHA})`;
  ctx.fillRect(0,0,sz.x,sz.y);
  ctx.globalCompositeOperation="destination-out";

  REGIONS.forEach(r=>{
    exploredMap[r.id].forEach(key=>{
      const [tx,ty]=key.split(",").map(Number);
      const [lat,lng]=tileCenter(r,tx,ty);
      const pt=map.latLngToContainerPoint([lat,lng]);
      const pt2=map.latLngToContainerPoint([lat+r.tileDeg,lng]);
      const rad=Math.abs(pt2.y-pt.y)*1.45+4;
      const grd=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,rad);
      grd.addColorStop(0,"rgba(0,0,0,1)");
      grd.addColorStop(0.55,"rgba(0,0,0,0.92)");
      grd.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=grd;
      ctx.beginPath(); ctx.arc(pt.x,pt.y,rad,0,Math.PI*2); ctx.fill();
    });
  });

  ctx.globalCompositeOperation="source-over";

  // Black overlay for areas outside ALL regions (uncompletable)
  // Sample a grid of screen points; if not in any region, darken it
  const step = 40;
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  for(let px=0; px<sz.x; px+=step) {
    for(let py=0; py<sz.y; py+=step) {
      const ll = map.containerPointToLatLng([px+step/2, py+step/2]);
      const inAny = REGIONS.some(r => {
        const {tx,ty} = latLngToTile(r, ll.lat, ll.lng);
        return inBounds(r, tx, ty);
      });
      if(!inAny) {
        ctx.fillRect(px, py, step, step);
      }
    }
  }

  // Player dot
  if(playerPos){
    const pt=map.latLngToContainerPoint([playerPos.lat,playerPos.lng]);
    ctx.beginPath();ctx.arc(pt.x,pt.y,20,0,Math.PI*2);ctx.fillStyle="rgba(0,255,140,0.07)";ctx.fill();
    ctx.beginPath();ctx.arc(pt.x,pt.y,11,0,Math.PI*2);ctx.fillStyle="rgba(0,255,140,0.17)";ctx.fill();
    ctx.beginPath();ctx.arc(pt.x,pt.y,5.5,0,Math.PI*2);ctx.fillStyle="#00ff8c";
    ctx.shadowColor="#00ff8c";ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(pt.x,pt.y,7,0,Math.PI*2);
    ctx.strokeStyle="rgba(0,255,140,0.5)";ctx.lineWidth=1.5;ctx.stroke();
    // Heading arrow if rotating
    if(rotateMode && deviceHeading!=null){
      ctx.save();
      ctx.translate(pt.x,pt.y);
      ctx.rotate(deviceHeading*Math.PI/180);
      ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(4,0);ctx.lineTo(-4,0);ctx.closePath();
      ctx.fillStyle="rgba(0,255,140,0.6)";ctx.fill();
      ctx.restore();
    }
  }
}

// ═══════════════════════════════════════════════════════
// MINIMAP
// ═══════════════════════════════════════════════════════
const mmCanvas = document.getElementById("minimap-canvas");
const mmCtx = mmCanvas.getContext("2d");
const MM = { latMin:43.6, latMax:48.3, lngMin:20.2, lngMax:29.8 };

function drawMinimap() {
  const W = mmCanvas.parentElement.clientWidth;
  const H = mmCanvas.parentElement.clientHeight;
  mmCanvas.width = W; mmCanvas.height = H;

  mmCtx.fillStyle = "#06090e";
  mmCtx.fillRect(0,0,W,H);

  function toMM(lat,lng) {
    return {
      x: (lng - MM.lngMin) / (MM.lngMax - MM.lngMin) * W,
      y: (1 - (lat - MM.latMin) / (MM.latMax - MM.latMin)) * H,
    };
  }

  // Draw explored tiles as dots
  REGIONS.forEach(r => {
    const color = BAR_COLORS[r.type] || "#00ff8c";
    mmCtx.fillStyle = color + "cc";
    exploredMap[r.id].forEach(key => {
      const [tx,ty] = key.split(",").map(Number);
      const [lat,lng] = tileCenter(r,tx,ty);
      const p = toMM(lat,lng);
      mmCtx.fillRect(p.x-0.8, p.y-0.8, 1.6, 1.6);
    });
  });

  // Map viewport box
  const bounds = map.getBounds();
  const tl = toMM(bounds.getNorth(), bounds.getWest());
  const br = toMM(bounds.getSouth(), bounds.getEast());
  mmCtx.strokeStyle = "rgba(0,255,140,0.4)";
  mmCtx.lineWidth = 1;
  mmCtx.strokeRect(tl.x, tl.y, br.x-tl.x, br.y-tl.y);

  // Player dot
  if (playerPos) {
    const p = toMM(playerPos.lat, playerPos.lng);
    mmCtx.beginPath();
    mmCtx.arc(p.x, p.y, 2.5, 0, Math.PI*2);
    mmCtx.fillStyle = "#00ff8c";
    mmCtx.fill();
  }
}

function regionPct(r){ return r ? exploredMap[r.id].size/(r.gridW*r.gridH)*100 : 0; }

  const totTiles=REGIONS.reduce((s,r)=>s+r.gridW*r.gridH,0);
  const expSum=REGIONS.reduce((s,r)=>s+exploredMap[r.id].size,0);
  document.getElementById("pct-total").textContent=(expSum/totTiles*100).toFixed(2)+"%";
  const done=REGIONS.filter(r=>regionPct(r)>=100).length;

  REGIONS.forEach(r=>{

}

function buildSidebar(currentRegion) {
  listEl.innerHTML = "";

    const aA = currentRegion && a.id===currentRegion.id ? 0 : 1;
    const bA = currentRegion && b.id===currentRegion.id ? 0 : 1;
    if(aA!==bA) return aA-bA;
    return a.name.localeCompare(b.name,"ro");
  });
  sorted.forEach(r => {
    const pct = regionPct(r);
    const item=document.createElement("div");
    item.className="region-item"+(currentRegion&&r.id===currentRegion.id?" active":"");
    item.id="ri-"+r.id;

  if(!tracking){
    if(!navigator.geolocation){showError("Geolocation not supported.");return;}
    watchId=navigator.geolocation.watchPosition(
      ({coords:{latitude:lat,longitude:lng,speed}})=>{
        if(lastPlayerPos) {
          revealLine(lastPlayerPos.lat,lastPlayerPos.lng,lat,lng);
          totalKm += haversineKm(lastPlayerPos.lat,lastPlayerPos.lng,lat,lng);
          updateKmHud();
        } else revealAt(lat,lng);
        lastPlayerPos={lat,lng}; playerPos={lat,lng};
        updateSpeed(speed);
        map.panTo([lat,lng],{animate:true,duration:0.5});
        updateAll(); redrawFog(); drawMinimap();
      },
      ()=>showError("GPS signal lost."),
      {enableHighAccuracy:!batterySaver, maximumAge:batterySaver?10000:0, timeout:10000}
    );
    requestWakeLock();
    sessionStart = Date.now(); sessionsCount++;
    tracking=true; btn.textContent="⊙ Tracking…"; btn.classList.add("on");
    document.getElementById("speed-hud").style.display="block";
  } else {
    navigator.geolocation.clearWatch(watchId);
    releaseWakeLock();
    if(sessionStart){ totalSeconds += Math.floor((Date.now()-sessionStart)/1000); sessionStart=null; saveStats(); }
    lastPlayerPos=null; tracking=false; btn.textContent="⊙ Track"; btn.classList.remove("on");
    document.getElementById("speed-hud").style.display="none";
  }
});

document.getElementById("btn-battery").addEventListener("click",()=>{
  const btn=document.getElementById("btn-battery");
  batterySaver=!batterySaver;
  btn.classList.toggle("on",batterySaver);
  showError(batterySaver ? "🔋 Battery saver ON — GPS every 10s, low accuracy" : "🔋 Battery saver OFF — full GPS");
  // Restart tracking with new settings if active
  if(tracking){
    navigator.geolocation.clearWatch(watchId);
    watchId=navigator.geolocation.watchPosition(
      ({coords:{latitude:lat,longitude:lng,speed}})=>{
        if(lastPlayerPos) {
          revealLine(lastPlayerPos.lat,lastPlayerPos.lng,lat,lng);
          totalKm += haversineKm(lastPlayerPos.lat,lastPlayerPos.lng,lat,lng);
          updateKmHud();
        } else revealAt(lat,lng);
        lastPlayerPos={lat,lng}; playerPos={lat,lng};
        updateSpeed(speed);
        map.panTo([lat,lng],{animate:true,duration:0.5});
        updateAll(); redrawFog(); drawMinimap();
      },
      ()=>showError("GPS signal lost."),
      {enableHighAccuracy:!batterySaver, maximumAge:batterySaver?10000:0, timeout:10000}
    );
  }
});

document.querySelectorAll(".style-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".style-btn").forEach(b=>b.classList.remove("on"));
    btn.classList.add("on");
    const s=STYLES[btn.dataset.style];
    tileLayer.remove();
    tileLayer=L.tileLayer(s.url,{attribution:s.attr,maxZoom:19}).addTo(map);
    tileLayer.setZIndex(1);
  });
});
document.getElementById("btn-sidebar").addEventListener("click",()=>{
  document.getElementById("sidebar").classList.toggle("open");
});
document.getElementById("btn-ach").addEventListener("click",()=>{
  renderAchPanel();
  document.getElementById("ach-panel").classList.add("open");
});
document.getElementById("btn-export").addEventListener("click",()=>{
  const data={};
  REGIONS.forEach(r=>{data[r.id]=[...exploredMap[r.id]];});
  const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`scraper-romania-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
});
document.getElementById("btn-import").addEventListener("click",()=>document.getElementById("import-input").click());
document.getElementById("import-input").addEventListener("change",e=>{
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      REGIONS.forEach(r=>{ if(data[r.id]) data[r.id].forEach(t=>exploredMap[r.id].add(t)); });
      saveProgress(); updateAll(); redrawFog();
      showError("✓ Import merged!");
    }catch{ showError("Import failed."); }
    e.target.value="";
  };
  reader.readAsText(file);
});
document.getElementById("btn-reset").addEventListener("click",()=>{
  if(confirm("Reset all progress?")) clearProgress();
});
function showError(msg){
  document.getElementById("error-msg").textContent=msg;
  const bar=document.getElementById("error-bar");
  bar.style.display="flex";
  setTimeout(()=>{ bar.style.display="none"; }, 4000);
}
function closeError(){ document.getElementById("error-bar").style.display="none"; }

// Online indicator
function updateOnlineStatus(){
  const dot=document.getElementById("online-dot");
  dot.style.background=navigator.onLine?"#00ff8c":"#ffaa00";
  dot.title=navigator.onLine?"Online":"Offline";
}
window.addEventListener("online",updateOnlineStatus);
window.addEventListener("offline",updateOnlineStatus);
updateOnlineStatus();

// Service Worker
if ("serviceWorker" in navigator) {
  const swScope = new URL("./", location.href).pathname;
  navigator.serviceWorker.register("./sw.js", { scope: swScope })
    .then(reg => console.log("SW registered, scope:", reg.scope))
    .catch(err => console.warn("SW failed:", err));
}

// Stats button
document.getElementById("btn-stats").addEventListener("click",()=>{
  renderStats();
  document.getElementById("stats-panel").classList.add("open");
});

// KM reset button
document.getElementById("km-reset").addEventListener("click",()=>{ if(confirm("Reset km counter?")){ totalKm=0; saveProgress(); updateKmHud(); } });

// Boot
loadProgress(); loadAchievements(); loadStats();
redrawFog(); updateAll(); renderAchPanel(); drawMinimap();
window.addEventListener("resize",()=>{ redrawFog(); drawMinimap(); });
</script>
