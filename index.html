<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SCRAPER · România</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#06090e" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet" />

  <style>
    html, body { height:100%; margin:0; background:#06090e; overflow:hidden; }
    body { font-family:'Space Mono', monospace; color:#c8d6e8; display:flex; flex-direction:column; }
    #map { position:absolute; inset:0; }
    #map-wrap { flex:1; position:relative; }
  </style>
</head>

<body>

<div id="map-wrap">
  <div id="map"></div>
</div>

<script>
const REGIONS = [
  { id:"bucuresti", name:"București", type:"CAPITALĂ", center:[44.4268,26.1025], zoom:13 },
  { id:"cluj", name:"Cluj-Napoca", type:"ORAȘ", center:[46.7712,23.6236], zoom:14 },
  { id:"timisoara", name:"Timișoara", type:"ORAȘ", center:[45.7489,21.2087], zoom:14 },
  { id:"iasi", name:"Iași", type:"ORAȘ", center:[47.1585,27.6014], zoom:14 },
  { id:"constanta", name:"Constanța", type:"ORAȘ", center:[44.1733,28.6383], zoom:14 },
  { id:"campulung", name:"Câmpulung", type:"ORAȘ", center:[45.2667,25.0500], zoom:14 }
];

window.addEventListener("load", () => {
  initApp();
});

function initApp() {
  const map = L.map('map').setView([45.9432, 24.9668], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  if ("geolocation" in navigator) {
    navigator.geolocation.watchPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        console.log(latitude, longitude);

        L.circleMarker([latitude, longitude], { radius: 6 }).addTo(map);
      },
      (err) => console.log(err),
      { enableHighAccuracy:true, maximumAge:0, timeout:10000 }
    );
  }
}
</script>

</body>
</html>
