    .region-item.active { background:#071520; border-left:2px solid #00ff8c; padding-left:10px; }
    .region-name { font-size:10px; color:#8ab4d4; letter-spacing:0.04em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; justify-content:space-between; }

    .region-pct { font-size:9px; color:#00ff8c; font-weight:700; margin-top:3px; }
    .region-bar-bg { height:3px; background:#0d1620; border-radius:2px; margin-top:4px; }
    .region-bar { height:3px; background:#00ff8c; border-radius:2px; width:0%; transition:width .3s; }
    .region-item.done .region-name { color:#00ff8c; }
    .region-item.done .region-pct::after { content:" ✓"; }

    #map { position:absolute; inset:0; width:100%; height:100%; }
    #fog { position:absolute; top:0; left:0; pointer-events:none; z-index:400; }
    #region-hud { position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:500; background:rgba(6,9,20,0.88); border:1px solid #0d2030; border-radius:5px; padding:6px 16px; text-align:center; display:none; pointer-events:none; white-space:nowrap; }

<div id="header">
  <div>
    <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#fff;letter-spacing:-0.03em;line-height:1">SCRAPER</div>

    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div style="text-align:right">
      <div class="stat-val" id="pct-total" style="color:#00ff8c">0.00%</div>
      <div class="stat-lbl">ROMÂNIA</div>
    </div>
    <div class="divider"></div>
    <div style="text-align:right">
      <div class="stat-val" id="regions-done" style="font-size:14px;color:#8ab4d4">0/0</div>
      <div class="stat-lbl">REGIONS</div>
    </div>
  </div>
</div>

<div id="toolbar">
  <button class="btn" id="btn-sidebar">☰</button>
  <button class="btn" id="btn-locate">⌖ Locate</button>
  <button class="btn" id="btn-track">⊙ Track</button>
  <div class="sep"></div>
  <span class="map-lbl">MAP</span>
  <button class="btn style-btn on" data-style="street">Street</button>
  <button class="btn style-btn"    data-style="dark">Dark</button>
  <button class="btn style-btn"    data-style="sat">Sat</button>
  <button class="btn style-btn"    data-style="topo">Topo</button>
  <button class="btn" id="btn-reset" style="margin-left:auto;background:#1a0808;color:#ff7070;border:1px solid #3a1010;font-size:9px;padding:4px 8px">⟳ Reset</button>
  <button class="btn" id="btn-export" style="background:#0d1a28;color:#4a7aaa;border:1px solid #1a3050;font-size:9px;padding:4px 8px">↑ Export</button>
  <button class="btn" id="btn-import" style="background:#0d1a28;color:#4a7aaa;border:1px solid #1a3050;font-size:9px;padding:4px 8px">↓ Import</button>
  <input type="file" id="import-input" accept=".json" style="display:none" />
</div>

<div id="error-bar">
  <span id="error-msg"></span>
  <button onclick="closeError()" style="background:none;border:none;color:#ff7070;cursor:pointer;font-size:14px;padding:0 4px">✕</button>
</div>

<div id="main">
  <div id="sidebar">
    <div class="sidebar-header">REGIONS · TAP TO JUMP</div>
    <div id="region-list"></div>
  </div>
  <div id="map-wrap">

      <div class="rh-tiles" id="hud-tiles">0 / 0 TILES</div>
    </div>
  </div>
</div>

// ── Persistence ──────────────────────────────────────────────────────────
const SAVE_KEY = "scraper_romania_v1";
function saveProgress() {
  const data = {};
  REGIONS.forEach(r => { data[r.id] = [...exploredMap[r.id]]; });
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) {}
}
function loadProgress() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    REGIONS.forEach(r => {
      if (data[r.id]) exploredMap[r.id] = new Set(data[r.id]);
    });
  } catch(e) {}
}
function clearProgress() {
  REGIONS.forEach(r => { exploredMap[r.id] = new Set(); });
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
  playerPos = null;
  updateAll(); redrawFog();
}

const exploredMap = {};
REGIONS.forEach(r => { exploredMap[r.id] = new Set(); });

let activeRegion = null;
let playerPos    = null;
let tracking     = false;
let watchId      = null;
let tileLayer    = null;

const STYLES = {
  street:{ url:"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",                                            attr:"© OpenStreetMap contributors" },
  dark:  { url:"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",                                 attr:"© CARTO"                      },
  sat:   { url:"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", attr:"© Esri"                       },
  topo:  { url:"https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",                                              attr:"© OpenTopoMap"                },
};
const FOG_ALPHA = 0.82;
const REVEAL_R  = 3;

// ── Geo helpers ──────────────────────────────────────────────────────────
function regionOrigin(r) {
  return [ r.center[0] + (r.gridH/2)*r.tileDeg, r.center[1] - (r.gridW/2)*r.tileDeg ];
}
function latLngToTile(r, lat, lng) {
  const [oLat,oLng] = regionOrigin(r);
  return { tx:Math.floor((lng-oLng)/r.tileDeg), ty:Math.floor((oLat-lat)/r.tileDeg) };
}
function tileCenter(r, tx, ty) {
  const [oLat,oLng] = regionOrigin(r);
  return [ oLat - ty*r.tileDeg - r.tileDeg/2, oLng + tx*r.tileDeg + r.tileDeg/2 ];
}
function inBounds(r, tx, ty) { return tx>=0 && tx<r.gridW && ty>=0 && ty<r.gridH; }
function regionsAt(lat, lng) {
  return REGIONS.filter(r => { const {tx,ty}=latLngToTile(r,lat,lng); return inBounds(r,tx,ty); });
}

// ── Reveal ───────────────────────────────────────────────────────────────
function revealAt(lat, lng) {
  const affected = regionsAt(lat, lng);
  affected.forEach(r => {
    const {tx,ty} = latLngToTile(r,lat,lng);
    for(let dx=-REVEAL_R;dx<=REVEAL_R;dx++)
      for(let dy=-REVEAL_R;dy<=REVEAL_R;dy++)
        if(dx*dx+dy*dy<=REVEAL_R*REVEAL_R) {
          const nx=tx+dx, ny=ty+dy;
          if(inBounds(r,nx,ny)) exploredMap[r.id].add(`${nx},${ny}`);
        }
  });
  if(affected.length>0) {
    const closest = affected.reduce((best,r)=>{
      const d=Math.hypot(r.center[0]-lat,r.center[1]-lng);
      return(!best||d<Math.hypot(best.center[0]-lat,best.center[1]-lng))?r:best;
    },null);
    setActiveRegion(closest);
  }
  saveProgress();
}

// ── Map ──────────────────────────────────────────────────────────────────
const map = L.map("map",{center:[45.9432,24.9668],zoom:7,zoomControl:false});
L.control.zoom({position:"bottomright"}).addTo(map);
tileLayer = L.tileLayer(STYLES.street.url,{attribution:STYLES.street.attr,maxZoom:19}).addTo(map);


map.on("move zoom resize moveend zoomend",redrawFog);

// ── Fog ──────────────────────────────────────────────────────────────────
const canvas=document.getElementById("fog"), ctx=canvas.getContext("2d");
function redrawFog() {
  const sz=map.getSize();
  canvas.width=sz.x; canvas.height=sz.y;
  canvas.style.width=sz.x+"px"; canvas.style.height=sz.y+"px";
  ctx.fillStyle=`rgba(6,9,20,${FOG_ALPHA})`;
  ctx.fillRect(0,0,sz.x,sz.y);
  ctx.globalCompositeOperation="destination-out";
  REGIONS.forEach(r=>{
    exploredMap[r.id].forEach(key=>{
      const [tx,ty]=key.split(",").map(Number);
      const [lat,lng]=tileCenter(r,tx,ty);
      const pt=map.latLngToContainerPoint([lat,lng]);
      const pt2=map.latLngToContainerPoint([lat+r.tileDeg,lng]);
      const rad=Math.abs(pt2.y-pt.y)*1.45+4;
      const grd=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,rad);
      grd.addColorStop(0,"rgba(0,0,0,1)");
      grd.addColorStop(0.55,"rgba(0,0,0,0.92)");
      grd.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=grd;
      ctx.beginPath(); ctx.arc(pt.x,pt.y,rad,0,Math.PI*2); ctx.fill();
    });
  });
  ctx.globalCompositeOperation="source-over";
  if(playerPos){
    const pt=map.latLngToContainerPoint([playerPos.lat,playerPos.lng]);
    ctx.beginPath();ctx.arc(pt.x,pt.y,20,0,Math.PI*2);ctx.fillStyle="rgba(0,255,140,0.07)";ctx.fill();
    ctx.beginPath();ctx.arc(pt.x,pt.y,11,0,Math.PI*2);ctx.fillStyle="rgba(0,255,140,0.17)";ctx.fill();
    ctx.beginPath();ctx.arc(pt.x,pt.y,5.5,0,Math.PI*2);ctx.fillStyle="#00ff8c";
    ctx.shadowColor="#00ff8c";ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(pt.x,pt.y,7,0,Math.PI*2);
    ctx.strokeStyle="rgba(0,255,140,0.5)";ctx.lineWidth=1.5;ctx.stroke();
  }
}

// ── Stats ─────────────────────────────────────────────────────────────────
function regionPct(r){ return exploredMap[r.id].size/(r.gridW*r.gridH)*100; }
function updateAll(){
  const totTiles=REGIONS.reduce((s,r)=>s+r.gridW*r.gridH,0);
  const expSum=REGIONS.reduce((s,r)=>s+exploredMap[r.id].size,0);
  document.getElementById("pct-total").textContent=(expSum/totTiles*100).toFixed(2)+"%";
  const done=REGIONS.filter(r=>regionPct(r)>=100).length;
  document.getElementById("regions-done").textContent=`${done}/${REGIONS.length}`;
  REGIONS.forEach(r=>{
    const pct=regionPct(r);
    const item=document.getElementById("ri-"+r.id);
    if(!item)return;
    item.querySelector(".region-pct").textContent=pct.toFixed(1)+"%";
    item.querySelector(".region-bar").style.width=Math.min(pct,100)+"%";
    item.classList.toggle("done",pct>=100);
  });
  updateHud();
}
function updateHud(){
  const hud=document.getElementById("region-hud");
  if(!activeRegion){hud.style.display="none";return;}
  const r=activeRegion, pct=regionPct(r);
  hud.style.display="block";
  document.getElementById("hud-name").textContent=r.name;
  document.getElementById("hud-pct").textContent=pct.toFixed(2)+"%";
  document.getElementById("hud-tiles").textContent=`${exploredMap[r.id].size} / ${r.gridW*r.gridH} TILES`;
}
function setActiveRegion(r){
  activeRegion=r;
  buildSidebar(r);
  updateHud();
}

// ── Sidebar ───────────────────────────────────────────────────────────────
const listEl=document.getElementById("region-list");
function buildSidebar(currentRegion) {
  listEl.innerHTML = "";
  const sorted = [...REGIONS].sort((a,b) => {
    const aActive = currentRegion && a.id === currentRegion.id ? 0 : 1;
    const bActive = currentRegion && b.id === currentRegion.id ? 0 : 1;
    if (aActive !== bActive) return aActive - bActive;
    return a.name.localeCompare(b.name, "ro");
  });
  sorted.forEach(r => {
    const item=document.createElement("div");
    item.className="region-item"; item.id="ri-"+r.id;
    if (currentRegion && r.id === currentRegion.id) item.classList.add("active");
    item.innerHTML=`
      <div class="region-name">
        <span>${r.name}</span>
        <span style="display:flex;align-items:center;gap:5px">
          <span class="rtype">${r.type}</span>
          <button class="del-btn" title="Clear region" style="background:none;border:none;color:#3a1010;cursor:pointer;font-size:11px;padding:0 2px;line-height:1">🗑</button>
        </span>
      </div>
      <div class="region-pct">0.0%</div>
      <div class="region-bar-bg"><div class="region-bar"></div></div>`;
    item.querySelector(".del-btn").addEventListener("click", e => {
      e.stopPropagation();
      if(confirm(`Clear "${r.name}"?`)) {
        exploredMap[r.id] = new Set();
        saveProgress();
        updateAll(); redrawFog();
      }
    });
    item.addEventListener("click",()=>{
      map.flyTo(r.center,r.zoom,{duration:1.0});
      setActiveRegion(r);
      document.getElementById("sidebar").classList.remove("open");
    });
    listEl.appendChild(item);
  });
}
buildSidebar(null);

// ── Buttons ───────────────────────────────────────────────────────────────
document.getElementById("btn-locate").addEventListener("click",()=>{
  const btn=document.getElementById("btn-locate");
  btn.disabled=true; btn.innerHTML='<span class="spin">⌖</span> …';
  navigator.geolocation.getCurrentPosition(
    ({coords:{latitude:lat,longitude:lng}})=>{
      playerPos={lat,lng}; revealAt(lat,lng);
      map.flyTo([lat,lng],activeRegion?activeRegion.zoom:14,{duration:1.2});
      updateAll(); redrawFog();
      btn.disabled=false; btn.innerHTML="⌖ Locate";
    },
    ()=>{ showError("GPS unavailable — tap the map to explore."); btn.disabled=false; btn.innerHTML="⌖ Locate"; },
    {enableHighAccuracy:true,timeout:8000}
  );
});
document.getElementById("btn-track").addEventListener("click",()=>{
  const btn=document.getElementById("btn-track");
  if(!tracking){
    if(!navigator.geolocation){showError("Geolocation not supported.");return;}
    watchId=navigator.geolocation.watchPosition(
      ({coords:{latitude:lat,longitude:lng}})=>{
        playerPos={lat,lng}; revealAt(lat,lng);
        map.panTo([lat,lng],{animate:true,duration:0.5});
        updateAll(); redrawFog();
      },
      ()=>showError("GPS signal lost."),
      {enableHighAccuracy:true,maximumAge:1000}
    );
    tracking=true; btn.textContent="⊙ Tracking…"; btn.classList.add("on");
  } else {
    navigator.geolocation.clearWatch(watchId);
    tracking=false; btn.textContent="⊙ Track"; btn.classList.remove("on");
  }
});
document.querySelectorAll(".style-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".style-btn").forEach(b=>b.classList.remove("on"));
    btn.classList.add("on");
    const s=STYLES[btn.dataset.style];
    tileLayer.remove();
    tileLayer=L.tileLayer(s.url,{attribution:s.attr,maxZoom:19}).addTo(map);
    tileLayer.setZIndex(1);
  });
});
document.getElementById("btn-sidebar").addEventListener("click",()=>{
  document.getElementById("sidebar").classList.toggle("open");
});
function showError(msg){
  document.getElementById("error-msg").textContent=msg;
  const bar=document.getElementById("error-bar");
  bar.style.display="flex"; bar.classList.add("fi");
}
function closeError(){ document.getElementById("error-bar").style.display="none"; }

document.getElementById("btn-export").addEventListener("click", () => {
  const data = {};
  REGIONS.forEach(r => { data[r.id] = [...exploredMap[r.id]]; });
  const blob = new Blob([JSON.stringify(data)], { type:"application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `scraper-romania-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
});

document.getElementById("btn-import").addEventListener("click", () => {
  document.getElementById("import-input").click();
});
document.getElementById("import-input").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      REGIONS.forEach(r => {
        if (data[r.id]) {
          // Merge — don't overwrite, combine both phones' progress
          data[r.id].forEach(tile => exploredMap[r.id].add(tile));
        }
      });
      saveProgress();
      updateAll(); redrawFog();
      showError("✓ Import successful — progress merged!");
    } catch {
      showError("Import failed — invalid file.");
    }
    e.target.value = "";
  };
  reader.readAsText(file);
});

document.getElementById("btn-reset").addEventListener("click",()=>{
  if(confirm("Reset all progress? This cannot be undone.")) clearProgress();
});

loadProgress();
redrawFog(); updateAll();
window.addEventListener("resize",redrawFog);

// ── Service Worker (offline) ──────────────────────────────────────────────
if("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
// Offline indicator
function updateOnlineStatus() {
  const dot = document.getElementById("online-dot");
  if (!dot) return;
  if (navigator.onLine) {
    dot.title = "Online"; dot.style.background = "#00ff8c";
  } else {
    dot.title = "Offline — using cached tiles"; dot.style.background = "#ffaa00";
  }
}
window.addEventListener("online",  updateOnlineStatus);
window.addEventListener("offline", updateOnlineStatus);
updateOnlineStatus();
</script>
